name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to reuse (default: latest tag)'
        required: false
        type: string
      source_ref:
        description: 'Git ref to build from when retrying manually'
        required: false
        default: 'main'
        type: string
      platform:
        description: 'Platform to build'
        required: false
        default: 'macos-latest'
        type: choice
        options:
          - macos-latest

jobs:
  get-latest-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.get_tag.outputs.tag }}
      release_id: ${{ steps.get_release.outputs.release_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release tag
        id: get_tag
        shell: bash
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            latest_tag="${{ inputs.release_tag }}"
          else
            latest_tag=$(git describe --tags --abbrev=0)
          fi

          echo "tag=$latest_tag" >> $GITHUB_OUTPUT
          echo "Resolved release tag: $latest_tag"
      - name: Get existing release
        id: get_release
        run: |
          release_id=$(gh api "repos/${{ github.repository }}/releases/tags/${{ steps.get_tag.outputs.tag }}" --jq '.id')
          echo "release_id=$release_id" >> $GITHUB_OUTPUT
          echo "Release ID: $release_id"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    if: github.event_name == 'push'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ format('Dance {0}', github.ref_name) }}
          body: 'See the assets to download and install this version.'
          draft: false
          prerelease: false

  release:
    needs: [create-release, get-latest-tag]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped' || needs.get-latest-tag.result == 'success')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.platform)) || fromJSON('["macos-latest"]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Determine release tag and version
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ needs.get-latest-tag.outputs.latest_tag }}"
            checkout_ref="${{ inputs.source_ref }}"
          else
            release_tag="${{ github.ref_name }}"
            checkout_ref="$release_tag"
          fi

          if [ -z "$checkout_ref" ]; then
            checkout_ref="$release_tag"
          fi

          release_version="${release_tag#v}"

          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$release_version" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "Using release tag $release_tag"
          echo "Using release version $release_version"
          echo "Using checkout ref $checkout_ref"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_meta.outputs.checkout_ref }}

      - name: Install dependencies
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install frontend dependencies
        run: pnpm install

      - name: Sync version files to release tag
        run: node scripts/sync-version.js --version "${{ steps.release_meta.outputs.version }}"

      - name: Verify version consistency
        run: node scripts/sync-version.js --check --version "${{ steps.release_meta.outputs.version }}"

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend bundle
        run: pnpm build

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Verify Aptabase Key is set
        run: |
          if [ -z "${{ secrets.APTABASE_APP_KEY }}" ]; then
            echo "✗ APTABASE_APP_KEY is not configured in GitHub Secrets"
            exit 1
          fi
          echo "✓ APTABASE_APP_KEY is configured in GitHub Secrets"
          echo "Key prefix: $(echo "${{ secrets.APTABASE_APP_KEY }}" | cut -c1-5)..."
        shell: bash

      - name: Build the app (macOS Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
        with:
          releaseId: ${{ github.event_name == 'workflow_dispatch' && needs.get-latest-tag.outputs.release_id || needs.create-release.outputs.release_id }}
          args: --target aarch64-apple-darwin

      - name: Build the app (macOS Intel)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
        with:
          releaseId: ${{ github.event_name == 'workflow_dispatch' && needs.get-latest-tag.outputs.release_id || needs.create-release.outputs.release_id }}
          args: --target x86_64-apple-darwin
